name: Build and Release libc++ for Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      llvm_version:
        description: 'LLVM version (e.g. "20.1.6", or "latest")'
        required: false
        default: 'latest'
      abi_namespaces:
        description: 'ABI namespaces to build (JSON array, e.g. ["__1","__myns"])'
        required: false
        default: '["__qq", "__Cr"]'

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      llvm_tag: ${{ steps.ver.outputs.llvm_tag }}
      llvm_version: ${{ steps.ver.outputs.llvm_version }}
      matrix: ${{ steps.mat.outputs.matrix }}
    steps:
      - name: Resolve LLVM version
        id: ver
        shell: bash
        run: |
          INPUT="${{ inputs.llvm_version }}"
          if [ -z "$INPUT" ] || [ "$INPUT" = "latest" ]; then
            TAG=$(curl -s https://api.github.com/repos/llvm/llvm-project/releases/latest | jq -r .tag_name)
          else
            TAG="llvmorg-$INPUT"
          fi
          VER="${TAG#llvmorg-}"
          echo "llvm_tag=$TAG"     >> "$GITHUB_OUTPUT"
          echo "llvm_version=$VER" >> "$GITHUB_OUTPUT"

      - name: Build matrix
        id: mat
        shell: bash
        run: |
          RAW='${{ inputs.abi_namespaces }}'
          if [ -z "$RAW" ]; then RAW='["__qq", "__Cr"]'; fi
          echo "matrix={\"arch\":[\"x64\",\"arm64\"],\"abi_namespace\":$RAW}" >> "$GITHUB_OUTPUT"

  build:
    needs: resolve
    runs-on: ${{ matrix.arch == 'arm64' && 'windows-11-arm' || 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve.outputs.matrix) }}

    env:
      LLVM_TAG: ${{ needs.resolve.outputs.llvm_tag }}
      LLVM_VER: ${{ needs.resolve.outputs.llvm_version }}
      NS: ${{ matrix.abi_namespace }}
      ARCH: ${{ matrix.arch }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}

      - name: Install Ninja
        run: choco install ninja -y

      - name: Clone LLVM source
        run: |
          git clone --depth 1 --branch ${{ env.LLVM_TAG }} `
            https://github.com/llvm/llvm-project.git llvm-project

      - name: Build Release
        shell: pwsh
        run: |
          cmake -G Ninja `
            -S llvm-project/runtimes -B build/Release `
            -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install/_temp_Release `
            -DLLVM_ENABLE_RUNTIMES=libcxx `
            -DLIBCXX_ENABLE_SHARED=ON -DLIBCXX_ENABLE_STATIC=ON `
            -DLIBCXX_INCLUDE_BENCHMARKS=OFF -DLIBCXX_INCLUDE_TESTS=OFF `
            -DLLVM_INCLUDE_TESTS=OFF `
            "-DLIBCXX_ABI_NAMESPACE=${{ env.NS }}" `
            -DLIBCXX_SHARED_OUTPUT_NAME=libc++ `
            -DLIBCXX_STATIC_OUTPUT_NAME=c++_static
          cmake --build build/Release --config Release
          cmake --install build/Release --config Release

      - name: Build Debug
        shell: pwsh
        run: |
          cmake -G Ninja `
            -S llvm-project/runtimes -B build/Debug `
            -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl `
            -DCMAKE_BUILD_TYPE=Debug `
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/install/_temp_Debug `
            -DLLVM_ENABLE_RUNTIMES=libcxx `
            -DLIBCXX_ENABLE_SHARED=ON -DLIBCXX_ENABLE_STATIC=ON `
            -DLIBCXX_INCLUDE_BENCHMARKS=OFF -DLIBCXX_INCLUDE_TESTS=OFF `
            -DLLVM_INCLUDE_TESTS=OFF `
            "-DLIBCXX_ABI_NAMESPACE=${{ env.NS }}" `
            -DLIBCXX_SHARED_OUTPUT_NAME=libc++ `
            -DLIBCXX_STATIC_OUTPUT_NAME=c++_static
          cmake --build build/Debug --config Debug
          cmake --install build/Debug --config Debug

      - name: Merge into multi-config layout
        shell: pwsh
        run: |
          $root = "${{ github.workspace }}/install"
          $dest = "$root/pkg"
          New-Item -ItemType Directory $dest -Force | Out-Null
          Copy-Item -Recurse "$root/_temp_Release/include" "$dest/include"
          foreach ($cfg in @("Release", "Debug")) {
            $src = "$root/_temp_$cfg"
            New-Item -ItemType Directory "$dest/lib/$cfg" -Force | Out-Null
            Copy-Item "$src/lib/*" "$dest/lib/$cfg/" -Recurse
            if (Test-Path "$src/bin") {
              New-Item -ItemType Directory "$dest/bin/$cfg" -Force | Out-Null
              Copy-Item "$src/bin/*" "$dest/bin/$cfg/" -Recurse
            }
          }
          Copy-Item -Recurse cmake "$dest/cmake"

      - name: Verify (Release)
        shell: pwsh
        run: |
          cmake -G Ninja -S test_project -B test_project/build_rel `
            -DCMAKE_CXX_COMPILER=clang-cl -DCMAKE_BUILD_TYPE=Release `
            -DLIBCXX_ROOT=${{ github.workspace }}/install/pkg
          cmake --build test_project/build_rel --config Release
          ./test_project/build_rel/test_static.exe

      - name: Verify (Debug)
        shell: pwsh
        run: |
          cmake -G Ninja -S test_project -B test_project/build_dbg `
            -DCMAKE_CXX_COMPILER=clang-cl -DCMAKE_BUILD_TYPE=Debug `
            -DLIBCXX_ROOT=${{ github.workspace }}/install/pkg
          cmake --build test_project/build_dbg --config Debug
          ./test_project/build_dbg/test_static.exe

      - name: Package
        id: package
        shell: pwsh
        run: |
          $zip = "libcxx-${{ env.LLVM_VER }}-windows-${{ env.ARCH }}-${{ env.NS }}.zip"
          Compress-Archive -Path install/pkg/* -DestinationPath $zip
          "zip_name=$zip" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libcxx-${{ env.ARCH }}-${{ env.NS }}
          path: ${{ steps.package.outputs.zip_name }}

  release:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4

      - name: Collect zips
        run: find . -name '*.zip' -exec mv {} . \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: libc++ ${{ needs.resolve.outputs.llvm_version }}
          body: |
            ## libc++ ${{ needs.resolve.outputs.llvm_version }} for Windows

            Pre-built LLVM libc++ for Windows (Debug + Release).

            | Architecture | Platforms |
            |---|---|
            | x64 | Intel/AMD 64-bit |
            | arm64 | ARM64 / Snapdragon / Windows on ARM |

            Each zip corresponds to a specific architecture + ABI namespace.

            ### Quick Start

            ```cmake
            set(LIBCXX_ROOT "path/to/extracted-zip")
            include(path/to/cmake/use-libcxx.cmake)
            use_libcxx_globally()
            ```

            Built from LLVM `${{ needs.resolve.outputs.llvm_tag }}`
          files: "*.zip"
          draft: false
          prerelease: false
